<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Ad Block</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
    }
    .header {
      background: #0077b5;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .body { padding: 16px; }
    .stat {
      text-align: center;
      padding: 16px;
      background: #f3f9fd;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .stat .num { font-size: 36px; font-weight: 700; color: #0077b5; }
    .stat .lbl { font-size: 12px; color: #777; margin-top: 4px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #f0f0f0;
    }
    .toggle-label { font-size: 13px; color: #333; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #0077b5; }
    input:checked + .slider:before { transform: translateX(18px); }
    .blocking-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: #eaf3fb;
      color: #0077b5;
    }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>LinkedIn Ad Block</h1>
      <div class="sub">Keeping your feed clean</div>
    </div>
  </div>

  <div class="body">
    <div class="stat">
      <div class="num" id="count">0</div>
      <div class="lbl">ads blocked this session</div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Blocking enabled</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="blocking-row">
      <span class="tag">Sponsored posts</span>
      <span class="tag">Display ads</span>
      <span class="tag">Promoted listings</span>
    </div>
  </div>

  <div class="footer">Works on linkedin.com only</div>

  <script src="popup.js"></script>
</body>
</html>
